<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Petrol Calculator</title>
    <link rel="stylesheet" href="calculator.css">
</head>

<body>

<div class="container">

    <!-- Title -->
    <h1>Petrol Calculator</h1>

    <!-- Input: Cost per litre -->
    <label>Cost per litre:</label>
    <input type="number" id="cost" value="1.72">

    <!-- Input: Litres -->
    <label>Litres purchased:</label>
    <input type="number" id="litres" value="0">

    <!-- Button -->
    <button onclick="calculateTotal()">Calculate</button>

    <!-- Output -->
    <p id="result">Total: 0</p>

</div>

<script src="calculator.js"></script>
</body>
</html>
